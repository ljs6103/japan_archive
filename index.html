<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="일본 한달살기 사진 아카이브 — 도쿄, 교토, 후지산 등 일본 곳곳의 기록">
  <title>드붕이의 모험</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Zen+Old+Mincho:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <div class="header__logo">
        <span class="header__icon">🇯🇵</span>
        <h1 class="header__title"> 일본 한달살기 아카이브</h1>
      </div>
      <p class="header__subtitle">走る先に、夢がある。</p>
    </div>
  </header>

  <!-- Filter Tags & Sort -->
  <div class="filter-bar">
    <nav class="tags" id="tags">
      <button class="tag tag--active" data-filter="all">전체</button>
    </nav>
    <button class="sort-toggle" id="sort-toggle" aria-label="정렬 순서 변경" title="오래된순">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 16 4 4 4-4" />
        <path d="M7 20V4" />
        <path d="m21 8-4-4-4 4" />
        <path d="M17 4v16" />
      </svg>
    </button>
  </div>

  <!-- View Mode Toggle (mobile only) -->
  <div class="view-toggle" id="view-toggle">
    <button class="view-toggle__btn view-toggle__btn--active" id="view-list" aria-label="리스트로 보기" title="리스트로 보기">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="3" width="16" height="4" rx="1.5" fill="currentColor" />
        <rect x="2" y="9" width="16" height="4" rx="1.5" fill="currentColor" opacity="0.6" />
        <rect x="2" y="15" width="16" height="2" rx="1" fill="currentColor" opacity="0.3" />
      </svg>
    </button>
    <button class="view-toggle__btn" id="view-grid" aria-label="바둑판식으로 보기" title="바둑판식으로 보기">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" />
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" />
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" />
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" />
      </svg>
    </button>
  </div>

  <!-- Gallery Grid -->
  <main class="gallery" id="gallery"></main>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">📸 사진 추가하기</h2>
        <button class="modal__close" id="modal-close" aria-label="닫기">&times;</button>
      </div>

      <form class="upload-form" id="upload-form">
        <!-- File Drop Zone -->
        <div class="upload-form__dropzone" id="dropzone">
          <div class="upload-form__dropzone-content">
            <span class="upload-form__dropzone-icon">🗾</span>
            <p class="upload-form__dropzone-text">사진을 드래그하거나 클릭해서 선택</p>
            <p class="upload-form__dropzone-hint">여러 장을 한 번에 올릴 수 있어요</p>
          </div>
          <input type="file" id="file-input" accept="image/*" multiple hidden>
        </div>

        <!-- Preview -->
        <div class="upload-form__preview" id="file-preview" hidden></div>

        <!-- Fields -->
        <div class="upload-form__field">
          <label class="upload-form__label" for="input-date">날짜</label>
          <input class="upload-form__input" type="date" id="input-date" required>
        </div>

        <div class="upload-form__field">
          <label class="upload-form__label" for="input-location">장소</label>
          <select class="upload-form__select" id="input-location" required>
            <option value="">지역 선택</option>
            <option value="도쿄">도쿄</option>
            <option value="히로시마">히로시마</option>
            <option value="기타">기타</option>
          </select>
          <input class="upload-form__input" type="text" id="input-location-detail" placeholder="상세 장소 (예: 신주쿠 골든가이)">
        </div>

        <div class="upload-form__field">
          <label class="upload-form__label" for="input-blog">블로그 포스팅 링크 <span
              class="upload-form__optional">(선택)</span></label>
          <input class="upload-form__input" type="url" id="input-blog" placeholder="https://blog.example.com/...">
        </div>

        <button class="upload-form__submit" type="submit">추가하기</button>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="delete-confirm-overlay" id="delete-confirm-modal">
    <div class="delete-confirm">
      <p class="delete-confirm__icon">🗑</p>
      <p class="delete-confirm__text">이 사진을 삭제할까요?</p>
      <div class="delete-confirm__actions">
        <button class="delete-confirm__btn delete-confirm__btn--cancel" id="delete-cancel">취소</button>
        <button class="delete-confirm__btn delete-confirm__btn--ok" id="delete-ok">삭제</button>
      </div>
    </div>
  </div>

  <!-- Floating Add Button -->
  <button class="fab" id="add-btn" aria-label="사진 추가">
    <span class="fab__icon">+</span>
  </button>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">✏️ 정보 수정</h2>
        <button class="modal__close" id="edit-modal-close" aria-label="닫기">&times;</button>
      </div>
      <form class="upload-form" id="edit-form">
        <!-- Image Replace Zone -->
        <div class="edit-image-zone" id="edit-image-zone">
          <img class="edit-image-zone__preview" id="edit-image-preview" src="" alt="현재 사진">
          <div class="edit-image-zone__overlay" id="edit-image-overlay">
            <span class="edit-image-zone__overlay-icon">📷</span>
            <span class="edit-image-zone__overlay-text">사진 변경</span>
          </div>
          <input type="file" id="edit-file-input" accept="image/*" hidden>
        </div>

        <div class="upload-form__field">
          <label class="upload-form__label" for="edit-date">날짜</label>
          <input class="upload-form__input" type="date" id="edit-date" required>
        </div>
        <div class="upload-form__field">
          <label class="upload-form__label" for="edit-location">장소</label>
          <select class="upload-form__select" id="edit-location" required>
            <option value="">지역 선택</option>
            <option value="도쿄">도쿄</option>
            <option value="히로시마">히로시마</option>
            <option value="기타">기타</option>
          </select>
          <input class="upload-form__input" type="text" id="edit-location-detail" placeholder="상세 장소 (예: 평화기념공원)">
        </div>
        <div class="upload-form__field">
          <label class="upload-form__label" for="edit-blog">블로그 링크 <span
              class="upload-form__optional">(선택)</span></label>
          <input class="upload-form__input" type="url" id="edit-blog" placeholder="https://blog.example.com/...">
        </div>
        <button class="upload-form__submit" type="submit">수정 완료</button>
      </form>
    </div>
  </div> <!-- Footer -->
  <footer class="footer">
    <p>© 2025 한달살기 아카이브 · Made with ☁️</p>
    <a class="footer__instagram" href="https://www.instagram.com/j_soooo/" target="_blank" rel="noopener noreferrer"
      aria-label="Instagram">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
      </svg>
    </a>
  </footer>

  <!-- Firebase SDK (compat) — Firestore only -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="app.js"></script>
</body>

</html>
